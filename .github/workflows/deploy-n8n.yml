name: Deploy to n8n

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'workflows/*.json'
      - '.github/workflows/deploy-n8n.yml'

  workflow_dispatch:
    inputs:
      workflow_file:
        description: 'Specific workflow file to deploy (e.g. company-registration.json). Leave empty to deploy all changed.'
        required: false
        type: string
      force_all:
        description: 'Force deploy ALL workflows (not just changed ones)'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy workflows to n8n
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Determine workflows to deploy
        id: detect
        run: |
          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            echo "Deploying ALL workflows (force_all=true)"
            FILES=$(ls workflows/*.json 2>/dev/null | tr '\n' ' ')
          elif [ -n "${{ github.event.inputs.workflow_file }}" ]; then
            FILE="workflows/${{ github.event.inputs.workflow_file }}"
            if [ ! -f "$FILE" ]; then
              echo "::error::File not found: $FILE"
              exit 1
            fi
            FILES="$FILE"
          else
            # Get changed workflow files in this push
            FILES=$(git diff --name-only HEAD~1 HEAD -- 'workflows/*.json' 2>/dev/null | tr '\n' ' ')

            # If deploy script itself changed, redeploy ALL workflows
            if [ -z "$FILES" ]; then
              SCRIPT_CHANGED=$(git diff --name-only HEAD~1 HEAD -- '.github/workflows/deploy-n8n.yml' 2>/dev/null || true)
              if [ -n "$SCRIPT_CHANGED" ]; then
                echo "Deploy script changed - deploying ALL workflows"
                FILES=$(ls workflows/*.json 2>/dev/null | tr '\n' ' ')
              fi
            fi
          fi

          if [ -z "$FILES" ]; then
            echo "No workflow files to deploy."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Files to deploy: $FILES"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync tags to n8n
        if: steps.detect.outputs.has_changes == 'true'
        id: tags
        env:
          N8N_URL: ${{ secrets.N8N_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          set -euo pipefail
          N8N_URL="${N8N_URL%/}"

          # Collect all unique tag names from workflow files
          TAG_NAMES=$(jq -r '.tags[]?.name // empty' workflows/*.json 2>/dev/null | sort -u)

          if [ -z "$TAG_NAMES" ]; then
            echo "No tags found in workflow files"
            echo "{}" > /tmp/tag_map.json
            exit 0
          fi

          # Get existing tags from n8n
          EXISTING=$(curl -s -k \
            -H "X-N8N-API-KEY: $N8N_API_KEY" \
            "$N8N_URL/api/v1/tags?limit=100" --max-time 15)

          # Build name→id map for existing tags
          declare -A TAG_MAP
          while IFS= read -r name; do
            id=$(echo "$EXISTING" | jq -r --arg n "$name" '.data[]? | select(.name == $n) | .id // empty')
            if [ -n "$id" ]; then
              echo "  Tag exists: '$name' → ID: $id"
              TAG_MAP["$name"]="$id"
            else
              # Create the tag
              CREATE_RESP=$(curl -s -k -X POST \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"name\": $(echo "$name" | jq -Rs .)}" \
                "$N8N_URL/api/v1/tags" --max-time 15)
              new_id=$(echo "$CREATE_RESP" | jq -r '.id // empty')
              if [ -n "$new_id" ]; then
                echo "  Tag created: '$name' → ID: $new_id"
                TAG_MAP["$name"]="$new_id"
              else
                echo "::warning::Failed to create tag '$name'"
              fi
            fi
          done <<< "$TAG_NAMES"

          # Export tag map as JSON file (avoids shell/output encoding issues with emojis)
          MAP_JSON="{"
          first=true
          for name in "${!TAG_MAP[@]}"; do
            if [ "$first" = true ]; then first=false; else MAP_JSON+=","; fi
            MAP_JSON+="$(echo "$name" | jq -Rs .):\"${TAG_MAP[$name]}\""
          done
          MAP_JSON+="}"
          echo "$MAP_JSON" > /tmp/tag_map.json
          echo "Tag map: $MAP_JSON"
          echo "Tag map saved to /tmp/tag_map.json"

      - name: Deploy workflows to n8n
        if: steps.detect.outputs.has_changes == 'true'
        env:
          N8N_URL: ${{ secrets.N8N_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${N8N_URL:-}" ] || [ -z "${N8N_API_KEY:-}" ]; then
            echo "::error::N8N_URL and N8N_API_KEY secrets must be configured"
            exit 1
          fi

          N8N_URL="${N8N_URL%/}"
          FILES="${{ steps.detect.outputs.files }}"
          ERRORS=0
          SUCCESS=0
          SKIPPED=0

          # Load tag map from file (written by previous step)
          if [ -f /tmp/tag_map.json ]; then
            echo "Tag map loaded: $(cat /tmp/tag_map.json)"
          else
            echo "{}" > /tmp/tag_map.json
            echo "No tag map file found, using empty map"
          fi

          for filepath in $FILES; do
            filename=$(basename "$filepath")

            if [ ! -f "$filepath" ]; then
              echo "::warning::File not found, skipping: $filepath"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # Extract workflow ID from JSON content
            WORKFLOW_ID=$(jq -r '.id // empty' "$filepath")
            WORKFLOW_NAME=$(jq -r '.name // "unnamed"' "$filepath")

            # Prepare payload - keep ONLY fields the n8n API accepts (no tags)
            jq '{name, nodes, connections, settings, staticData}' "$filepath" > /tmp/payload.json

            # Test connectivity first
            if [ "$filepath" = "$(echo $FILES | awk '{print $1}')" ]; then
              echo "Testing connection to n8n at: ${N8N_URL}/api/v1/workflows"
              curl -sSf -k -o /dev/null -w "Connection OK (HTTP %{http_code})\n" \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                "$N8N_URL/api/v1/workflows" --max-time 15 || {
                echo "::error::Cannot reach n8n API at $N8N_URL - check N8N_URL secret and server accessibility"
                exit 1
              }
            fi

            if [ -z "$WORKFLOW_ID" ]; then
              # NEW workflow - create via POST
              echo "---"
              echo "Creating NEW workflow: $WORKFLOW_NAME"

              HTTP_CODE=$(curl -s -k -o /tmp/response.json -w "%{http_code}" \
                -X POST \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                -H "Content-Type: application/json" \
                -d @/tmp/payload.json \
                "$N8N_URL/api/v1/workflows" \
                --max-time 30 \
                --retry 2 \
                --retry-delay 3)

              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                # Extract the new ID from response and update the local file
                NEW_ID=$(jq -r '.id // empty' /tmp/response.json)
                if [ -n "$NEW_ID" ]; then
                  jq --arg id "$NEW_ID" '.id = $id' "$filepath" > /tmp/updated_workflow.json \
                    && mv /tmp/updated_workflow.json "$filepath"
                  WORKFLOW_ID="$NEW_ID"
                  echo "  ✅ Created successfully: $WORKFLOW_NAME (new ID: $NEW_ID)"

                  # Commit the updated ID back to the repo
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add "$filepath"
                  git commit -m "chore: add n8n workflow ID to $filename" || true
                  git push || true
                fi
                SUCCESS=$((SUCCESS + 1))
              else
                BODY=$(cat /tmp/response.json 2>/dev/null || echo "No response body")
                MSG=$(echo "$BODY" | jq -r '.message // .' 2>/dev/null || echo "$BODY")
                echo "::error::Failed to create $WORKFLOW_NAME - HTTP $HTTP_CODE: $MSG"
                ERRORS=$((ERRORS + 1))
                continue
              fi
            else
              # EXISTING workflow - update via PUT
              echo "---"
              echo "Deploying: $WORKFLOW_NAME (ID: $WORKFLOW_ID)"

              HTTP_CODE=$(curl -s -k -o /tmp/response.json -w "%{http_code}" \
                -X PUT \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                -H "Content-Type: application/json" \
                -d @/tmp/payload.json \
                "$N8N_URL/api/v1/workflows/$WORKFLOW_ID" \
                --max-time 30 \
                --retry 2 \
                --retry-delay 3)

              if [ "$HTTP_CODE" = "200" ]; then
                echo "  ✅ Deployed successfully: $WORKFLOW_NAME"
                SUCCESS=$((SUCCESS + 1))
              else
                BODY=$(cat /tmp/response.json 2>/dev/null || echo "No response body")
                MSG=$(echo "$BODY" | jq -r '.message // .' 2>/dev/null || echo "$BODY")
                echo "::error::Failed to deploy $WORKFLOW_NAME (ID: $WORKFLOW_ID) - HTTP $HTTP_CODE: $MSG"
                ERRORS=$((ERRORS + 1))
                continue
              fi
            fi

            # Apply tags via separate API call (n8n doesn't accept tags in PUT body)
            # Read tag map from file to avoid shell encoding issues with emojis
            TAG_IDS=$(jq --slurpfile tagmap /tmp/tag_map.json -c \
              '[.tags[]? | {id: ($tagmap[0][.name] // empty)} | select(.id)]' "$filepath")

            echo "  Tags to apply: $TAG_IDS"

            if [ "$TAG_IDS" != "[]" ] && [ "$TAG_IDS" != "null" ] && [ -n "$TAG_IDS" ]; then
              TAG_HTTP=$(curl -s -k -o /tmp/tag_response.json -w "%{http_code}" \
                -X PUT \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                -H "Content-Type: application/json" \
                -d "$TAG_IDS" \
                "$N8N_URL/api/v1/workflows/$WORKFLOW_ID/tags" \
                --max-time 15)

              if [ "$TAG_HTTP" = "200" ]; then
                echo "  🏷️  Tags applied successfully"
              else
                TAG_BODY=$(cat /tmp/tag_response.json 2>/dev/null || echo "No response")
                echo "  ⚠️  Tags failed (HTTP $TAG_HTTP): $TAG_BODY"
              fi
            fi
          done

          echo ""
          echo "=============================="
          echo "Deployment Summary"
          echo "  Success: $SUCCESS"
          echo "  Failed:  $ERRORS"
          echo "  Skipped: $SKIPPED"
          echo "=============================="

          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi

      - name: No changes to deploy
        if: steps.detect.outputs.has_changes != 'true'
        run: echo "No workflow files changed in this push. Nothing to deploy."
