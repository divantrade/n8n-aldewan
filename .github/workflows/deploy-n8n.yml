name: Deploy to n8n

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'workflows/*.json'

  workflow_dispatch:
    inputs:
      workflow_file:
        description: 'Specific workflow file to deploy (e.g. company-registration.json). Leave empty to deploy all changed.'
        required: false
        type: string
      force_all:
        description: 'Force deploy ALL workflows (not just changed ones)'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy workflows to n8n
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Determine workflows to deploy
        id: detect
        run: |
          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            echo "Deploying ALL workflows (force_all=true)"
            FILES=$(ls workflows/*.json 2>/dev/null | tr '\n' ' ')
          elif [ -n "${{ github.event.inputs.workflow_file }}" ]; then
            FILE="workflows/${{ github.event.inputs.workflow_file }}"
            if [ ! -f "$FILE" ]; then
              echo "::error::File not found: $FILE"
              exit 1
            fi
            FILES="$FILE"
          else
            # Get changed workflow files in this push
            FILES=$(git diff --name-only HEAD~1 HEAD -- 'workflows/*.json' 2>/dev/null | tr '\n' ' ')
          fi

          if [ -z "$FILES" ]; then
            echo "No workflow files to deploy."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Files to deploy: $FILES"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy workflows to n8n
        if: steps.detect.outputs.has_changes == 'true'
        env:
          N8N_URL: ${{ secrets.N8N_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${N8N_URL:-}" ] || [ -z "${N8N_API_KEY:-}" ]; then
            echo "::error::N8N_URL and N8N_API_KEY secrets must be configured"
            exit 1
          fi

          N8N_URL="${N8N_URL%/}"
          FILES="${{ steps.detect.outputs.files }}"
          ERRORS=0
          SUCCESS=0
          SKIPPED=0

          for filepath in $FILES; do
            filename=$(basename "$filepath")

            if [ ! -f "$filepath" ]; then
              echo "::warning::File not found, skipping: $filepath"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # Extract workflow ID from JSON content
            WORKFLOW_ID=$(jq -r '.id // empty' "$filepath")

            if [ -z "$WORKFLOW_ID" ]; then
              echo "::warning::No workflow ID found in $filename, skipping"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            WORKFLOW_NAME=$(jq -r '.name // "unnamed"' "$filepath")
            echo "---"
            echo "Deploying: $WORKFLOW_NAME (ID: $WORKFLOW_ID)"

            # Prepare payload - remove read-only fields
            PAYLOAD=$(jq 'del(.id, .createdAt, .updatedAt, .versionId) | {name, nodes, connections, settings, staticData, tags}' "$filepath")

            # Test connectivity first
            if [ "$filepath" = "$(echo $FILES | awk '{print $1}')" ]; then
              echo "Testing connection to n8n at: ${N8N_URL}/api/v1/workflows"
              curl -sSf -k -o /dev/null -w "Connection OK (HTTP %{http_code})\n" \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                "$N8N_URL/api/v1/workflows" --max-time 15 || {
                echo "::error::Cannot reach n8n API at $N8N_URL - check N8N_URL secret and server accessibility"
                exit 1
              }
            fi

            # Deploy via n8n API (-k allows self-signed SSL certificates)
            HTTP_CODE=$(curl -s -k -o /tmp/response.json -w "%{http_code}" \
              -X PUT \
              -H "X-N8N-API-KEY: $N8N_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$N8N_URL/api/v1/workflows/$WORKFLOW_ID" \
              --max-time 30 \
              --retry 2 \
              --retry-delay 3)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✅ Deployed successfully: $WORKFLOW_NAME"
              SUCCESS=$((SUCCESS + 1))
            else
              BODY=$(cat /tmp/response.json 2>/dev/null || echo "No response body")
              MSG=$(echo "$BODY" | jq -r '.message // .' 2>/dev/null || echo "$BODY")
              echo "::error::Failed to deploy $WORKFLOW_NAME (ID: $WORKFLOW_ID) - HTTP $HTTP_CODE: $MSG"
              ERRORS=$((ERRORS + 1))
            fi
          done

          echo ""
          echo "=============================="
          echo "Deployment Summary"
          echo "  Success: $SUCCESS"
          echo "  Failed:  $ERRORS"
          echo "  Skipped: $SKIPPED"
          echo "=============================="

          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi

      - name: No changes to deploy
        if: steps.detect.outputs.has_changes != 'true'
        run: echo "No workflow files changed in this push. Nothing to deploy."
